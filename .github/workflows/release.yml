name: Build and Release

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: write

jobs:
  build:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')

    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            archive: homunc-linux-x86_64.tar.gz
          - target: aarch64-unknown-linux-gnu
            archive: homunc-linux-aarch64.tar.gz
          - target: x86_64-pc-windows-gnu
            archive: homunc-windows-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Build with Docker
        run: |
          docker buildx build \
            --build-arg TARGET=${{ matrix.target }} \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --output type=local,dest=./out .

      - name: Package (tar.gz)
        if: "!contains(matrix.archive, '.zip')"
        run: tar czf ${{ matrix.archive }} -C out .

      - name: Package (zip)
        if: contains(matrix.archive, '.zip')
        run: cd out && zip -r ../${{ matrix.archive }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  build-wasm:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Build WASM with Docker
        run: |
          docker buildx build \
            -f Dockerfile.wasm \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --output type=local,dest=./out .

      - name: Package WASM
        run: tar czf homunc-wasm.tar.gz -C out .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: homunc-wasm.tar.gz
          path: homunc-wasm.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: [build, build-wasm]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
          artifacts: artifacts/*
          allowUpdates: true
